apiVersion: v1
kind: ServiceAccount
metadata:
  name: secure-app-sa
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/secure-app-role"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "app-role"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "db-password"
        objectType: "secretsmanager"
        jmesPath:
          - path: "password"
            objectAlias: "db_password"
      - objectName: "aws-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "access_key"
            objectAlias: "aws_access_key_id"
          - path: "secret_key"
            objectAlias: "aws_secret_access_key"
